name: medcare_plus
description: "Medcare_Plus- A Healthcare Management App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.1.0
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  flutter_timezone: ^5.0.2
  flutter_native_splash: ^2.4.0
  firebase_core: ^3.10.1
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.7.0
  http: ^0.13.6
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1   # ✅ correct spelling

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png
    - assets/audio/samsung_galaxy_s22.mp3
    - .env

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

flutter_native_splash:
  color: "#ffffff"
  image: assets/icon.png
  android: true
  ios: true
